services:
  apache:
    build: apache
    ports:
      - "80:80"
    volumes:
      - ./apache/www:/var/www/html
    depends_on:
      - server
    networks:
      - AnimeGamba

  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ./db_data:/var/lib/postgresql:Z
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - AnimeGamba
    ports:
      - "5432:5432"

  server:
    build: server
    ports:
      - "3000:3000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    networks:
      - AnimeGamba

networks:
  AnimeGamba:
    driver: bridge
